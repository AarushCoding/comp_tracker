name: WCA UK Monitor

on:
  schedule:
    - cron: '0 18 */3 * *'  # Runs at 00:00 every 3 days
  workflow_dispatch:      # Allows you to click "Run" manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required for the bot to update comps.txt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'WCA-Bot'
          git config --global user.email 'bot@github.com'
          git add comps.txt
          git commit -m "Update seen competitions" || exit 0
          git push
